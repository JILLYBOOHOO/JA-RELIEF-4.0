<div class="accessibility-bar">
  <div class="container">
    <div class="left-section">
      <ng-content></ng-content>
    </div>
    <div class="accessibility-controls">
      <span class="label">ACCESSIBILITY:</span>
      <div class="btn-group">
        <button (click)="setSize('normal')" [class.active]="currentSize === 'normal'" title="Normal Font">A</button>
        <button (click)="setSize('large')" [class.active]="currentSize === 'large'" title="Large Font">A+</button>
        <button (click)="setSize('huge')" [class.active]="currentSize === 'huge'" title="Extra Large Font">A++</button>
      </div>
      <div class="divider"></div>
      <button class="voice-nav-indicator page-guide-btn" (click)="startGuide()" title="Launch Interactive Page Guide with Text & Voice">
         <span class="material-symbols-outlined">menu_book</span>
         Page Guide
      </button>
       <button class="voice-nav-indicator" [class.is-active]="(accessibilityService.isAudioEnabled$ | async)" (click)="toggleAudio()" title="Toggle Voice Guidance / Mute Assistant">
         <span class="material-symbols-outlined">{{ (accessibilityService.isAudioEnabled$ | async) ? 'volume_up' : 'volume_off' }}</span>
         Auto Audio
      </button>
      <button class="voice-nav-indicator" [class.is-active]="(speechService.isListening$ | async)" (click)="toggleVoice()" title="Toggle Universal Voice Navigation (Mic Command Mode)">
         <span class="material-symbols-outlined">{{ (speechService.isListening$ | async) ? 'mic' : 'mic_off' }}</span>
         Voice Nav
      </button>
    </div>
  </div>
</div>
